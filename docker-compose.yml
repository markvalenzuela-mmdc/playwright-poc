services:
  postgres:
    image: postgres:16
    container_name: playwright-poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: ${POSTGRES_DB:-playwright}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test} -d ${POSTGRES_DB:-playwright}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - ./.docker/postgres-data:/var/lib/postgresql/data
